<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alessia & Roberto - 11 Luglio 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Lora', serif; background-color: #fffaf5; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(122, 62, 46, 0.3); border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .scroll-mt-20 { scroll-margin-top: 5rem; }
        .location-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .location-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkRq8hMwlsSjhc-4Z8mMGDsbWvx295F54",
            authDomain: "matrimonio-ale-e-roby-5248c.firebaseapp.com",
            projectId: "matrimonio-ale-e-roby-5248c",
            storageBucket: "matrimonio-ale-e-roby-5248c.firebasestorage.app",
            messagingSenderId: "797207643656",
            appId: "1:797207643656:web:177acffeab23841cb6f3bd"
        };

        window.FB = { 
            initializeApp, getFirestore, collection, addDoc, onSnapshot, 
            serverTimestamp, deleteDoc, doc, getAuth, signInAnonymously, 
            signInWithCustomToken, onAuthStateChanged, query, orderBy,
            config: firebaseConfig 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configurazione Immagini e Dati
        const URL_FOTO_HERO = "https://raw.githubusercontent.com/Matteo20240405/matrimonio-Aleroby/main/IMG-20260103-WA0013.jpg";
        const URL_CHIESA = "https://upload.wikimedia.org/wikipedia/commons/9/92/Vendone-panorama.jpg";
        const URL_RICEVIMENTO = "https://borgofasceo.it/wp-content/uploads/2025/05/relais-drone-laterale.jpg";
        const DATA_MATRIMONIO = new Date("2026-07-11T16:00:00");
        const IBAN = "IT28W0538710611000004465451";

        const App = () => {
            const [user, setUser] = useState(null);
            const [photos, setPhotos] = useState([]);
            const [rsvps, setRsvps] = useState([]);
            const [formData, setFormData] = useState({ name: '', attending: 'si' });
            const [submitted, setSubmitted] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [copySuccess, setCopySuccess] = useState(false);
            
            const clickCount = useRef(0);
            const clickTimer = useRef(null);

            useEffect(() => {
                if (!window.FB || !window.FB.config) return;
                const app = window.FB.initializeApp(window.FB.config);
                const auth = window.FB.getAuth(app);
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await window.FB.signInWithCustomToken(auth, __initial_auth_token); } 
                            catch (e) { await window.FB.signInAnonymously(auth); }
                        } else { await window.FB.signInAnonymously(auth); }
                    } catch (err) { console.error("Auth error:", err); }
                };
                initAuth();
                const unsubAuth = window.FB.onAuthStateChanged(auth, setUser);

                const timer = setInterval(() => {
                    const now = new Date();
                    const diff = DATA_MATRIMONIO - now;
                    if (diff > 0) {
                        setTimeLeft({
                            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            minutes: Math.floor((diff / 1000 / 60) % 60),
                            seconds: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);

                return () => { clearInterval(timer); unsubAuth(); };
            }, []);

            useEffect(() => {
                if (!user || !window.FB) return;
                const db = window.FB.getFirestore();
                const appId = "wedding-alessia-roberto-2026";
                
                const qPhotos = window.FB.query(
                    window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'photos'),
                    window.FB.orderBy('timestamp', 'desc')
                );

                const unsubP = window.FB.onSnapshot(qPhotos, snap => {
                    setPhotos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error("Snapshot error:", err));

                const unsubR = window.FB.onSnapshot(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'rsvp'), snap => {
                    setRsvps(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubP(); unsubR(); };
            }, [user]);

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !user) return;
                setUploading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const db = window.FB.getFirestore();
                    const appId = "wedding-alessia-roberto-2026";
                    try {
                        await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'photos'), {
                            url: reader.result,
                            timestamp: window.FB.serverTimestamp()
                        });
                    } catch (err) { console.error("Upload error:", err); }
                    setUploading(false);
                };
                reader.readAsDataURL(file);
            };

            const deletePhoto = async (id) => {
                if (!window.confirm("Vuoi eliminare questa foto?")) return;
                const db = window.FB.getFirestore();
                const appId = "wedding-alessia-roberto-2026";
                await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'photos', id));
            };

            const handleAdminToggle = () => {
                clickCount.current++;
                if (clickCount.current === 1) clickTimer.current = setTimeout(() => clickCount.current = 0, 2000);
                if (clickCount.current >= 3) { 
                    setIsAdmin(!isAdmin); 
                    clickCount.current = 0; 
                }
            };

            const copyIban = () => {
                const textArea = document.createElement("textarea");
                textArea.value = IBAN;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if(el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="text-stone-900 min-h-screen pb-20">
                    {/* Navigazione */}
                    <nav className="fixed top-0 w-full z-50 py-5 px-6 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
                        <span onClick={handleAdminToggle} className="text-3xl font-bold italic text-white cursor-pointer font-cursive select-none">A & R</span>
                        <div className="flex gap-4">
                            <button onClick={() => scrollTo('locations')} className="text-white text-[10px] uppercase tracking-widest font-bold drop-shadow-md">Luoghi</button>
                            <button onClick={() => scrollTo('photos')} className="text-white text-[10px] uppercase tracking-widest font-bold drop-shadow-md">Foto</button>
                            <button onClick={() => scrollTo('rsvp')} className="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border border-white/30 text-white text-[11px] font-bold uppercase tracking-widest shadow-lg">RSVP</button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative w-full h-[85vh] flex flex-col justify-center items-center overflow-hidden">
                        <img src={URL_FOTO_HERO} className="absolute inset-0 w-full h-full object-cover" alt="Sposi" />
                        <div className="absolute inset-0 bg-black/25 z-10" />
                        <div className="relative z-20 text-center px-6 animate-fade-in">
                            <h1 className="text-7xl md:text-[10rem] mb-6 text-white font-cursive drop-shadow-2xl">Alessia & Roberto</h1>
                            <p className="text-white tracking-[0.5em] uppercase text-xs font-bold opacity-90 mb-12 drop-shadow-md">11 Luglio 2026 • Vendone</p>
                            
                            <div className="flex gap-4 justify-center text-white scale-90 md:scale-100">
                                {[{label:'Giorni', v:timeLeft.days}, {label:'Ore', v:timeLeft.hours}, {label:'Minuti', v:timeLeft.minutes}].map((t,i) => (
                                    <div key={i} className="bg-white/10 backdrop-blur-lg p-5 rounded-3xl min-w-[85px] border border-white/20 shadow-2xl">
                                        <span className="block text-3xl font-bold">{t.v}</span>
                                        <span className="text-[9px] uppercase tracking-widest opacity-70">{t.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Sezione Luoghi */}
                    <section id="locations" className="py-24 px-6 max-w-6xl mx-auto scroll-mt-20">
                        <div className="text-center mb-16">
                            <h2 className="text-6xl text-[#7a3e2e] mb-4 italic font-cursive">Programma</h2>
                            <p className="text-stone-400 text-[11px] uppercase tracking-[0.3em] font-bold">I luoghi del nostro sì</p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-12">
                            {/* Card Chiesa */}
                            <div className="location-card bg-white rounded-[3.5rem] shadow-xl overflow-hidden border border-stone-100 flex flex-col">
                                <div className="h-72 overflow-hidden">
                                    <img src={URL_CHIESA} className="w-full h-full object-cover" alt="Panorama Vendone" />
                                </div>
                                <div className="p-10 text-center flex-grow flex flex-col items-center">
                                    <div className="bg-stone-50 w-16 h-16 rounded-full flex items-center justify-center text-2xl mb-6 shadow-inner">⛪</div>
                                    <h3 className="text-3xl font-cursive text-[#7a3e2e] mb-2">La Cerimonia</h3>
                                    <p className="text-stone-800 font-bold mb-1">Ore 16:00</p>
                                    <p className="text-stone-500 mb-6 uppercase text-[12px] tracking-widest">Chiesa di Sant'Antonino, Vendone</p>
                                    <a href="https://maps.google.com/?q=Chiesa+Sant+Antonino+Vendone" target="_blank" className="mt-auto inline-block text-[#7a3e2e] text-[10px] font-bold border-b-2 border-[#7a3e2e]/20 hover:border-[#7a3e2e] pb-1 uppercase tracking-widest transition-all">Apri navigatore</a>
                                </div>
                            </div>
                            
                            {/* Card Ricevimento */}
                            <div className="location-card bg-white rounded-[3.5rem] shadow-xl overflow-hidden border border-stone-100 flex flex-col">
                                <div className="h-72 overflow-hidden">
                                    <img src={URL_RICEVIMENTO} className="w-full h-full object-cover" alt="Relais Borgofasceo" />
                                </div>
                                <div className="p-10 text-center flex-grow flex flex-col items-center">
                                    <div className="bg-stone-50 w-16 h-16 rounded-full flex items-center justify-center text-2xl mb-6 shadow-inner">🥂</div>
                                    <h3 className="text-3xl font-cursive text-[#7a3e2e] mb-2">Il Ricevimento</h3>
                                    <p className="text-stone-800 font-bold mb-1">A seguire</p>
                                    <p className="text-stone-500 mb-6 uppercase text-[12px] tracking-widest">Relais Borgofasceo, Ortovero</p>
                                    <a href="https://maps.google.com/?q=Relais+Borgofasceo+Ortovero" target="_blank" className="mt-auto inline-block text-[#7a3e2e] text-[10px] font-bold border-b-2 border-[#7a3e2e]/20 hover:border-[#7a3e2e] pb-1 uppercase tracking-widest transition-all">Apri navigatore</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Lista Nozze */}
                    <section className="py-24 px-6 bg-stone-100 border-y border-stone-200">
                        <div className="max-w-xl mx-auto text-center">
                            <h2 className="text-6xl text-[#7a3e2e] mb-8 italic font-cursive">Lista Nozze</h2>
                            <p className="text-stone-600 mb-12 italic leading-relaxed">
                                Il regalo più grande sarà la vostra presenza. <br/>
                                Se però desiderate farci un pensiero, ecco come aiutarci a realizzare i nostri sogni.
                            </p>
                            
                            <div className="bg-white p-10 rounded-[3rem] shadow-xl mb-10 group cursor-pointer relative overflow-hidden" onClick={copyIban}>
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                                </div>
                                <span className="text-[10px] uppercase font-bold text-stone-400 tracking-widest mb-4 block">Copia IBAN</span>
                                <p className="text-stone-800 font-mono text-[14px] md:text-[16px] break-all font-bold tracking-tight">
                                    {copySuccess ? "IBAN COPIATO NEGLI APPUNTI! ✅" : IBAN}
                                </p>
                            </div>

                            <a href="https://paypal.me/AlessiaRabellino" target="_blank" className="inline-flex items-center gap-4 bg-[#0070ba] text-white px-14 py-5 rounded-full font-bold text-[12px] uppercase tracking-widest shadow-2xl hover:scale-105 active:scale-95 transition-all">
                                <span>Contributo con PayPal</span>
                                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.067 8.178c0 2.846-2.103 5.48-5.48 5.48h-1.482l-.618 3.597-.02.12h-2.181l.011-.059.85-4.949.03-.173h2.384c2.251 0 3.737-1.42 3.737-3.376 0-1.87-1.161-3.232-2.946-3.232H9.863L8.242 16.59H6.061L8.33 3.39h6.494c2.937 0 5.243 1.83 5.243 4.788zM6.662 16.03h2.181l-.403 2.348h-2.182z"/></svg>
                            </a>
                        </div>
                    </section>

                    {/* Album Foto */}
                    <section id="photos" className="py-24 px-6 max-w-6xl mx-auto scroll-mt-20">
                        <div className="text-center mb-16">
                            <h2 className="text-6xl text-[#7a3e2e] mb-4 italic font-cursive">Album di Nozze</h2>
                            <p className="text-stone-400 text-[11px] uppercase tracking-[0.3em] font-bold">Condividete i vostri ricordi con noi</p>
                        </div>
                        
                        <div className="flex justify-center mb-16">
                            <label className={`group cursor-pointer bg-[#7a3e2e] text-white px-12 py-6 rounded-full font-bold uppercase text-[12px] tracking-[0.2em] shadow-2xl inline-flex items-center gap-4 transition-all hover:bg-[#8e4a37] ${uploading ? 'opacity-50' : 'active:scale-95'}`}>
                                <svg className={`w-6 h-6 ${uploading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                <span>{uploading ? 'CARICAMENTO IN CORSO...' : 'CARICA LE TUE FOTO'}</span>
                                <input type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} disabled={uploading} />
                            </label>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {photos.map(photo => (
                                <div key={photo.id} className="relative aspect-square rounded-[2rem] overflow-hidden shadow-xl group cursor-zoom-in">
                                    <img src={photo.url} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy" />
                                    {isAdmin && (
                                        <button onClick={(e) => { e.stopPropagation(); deletePhoto(photo.id); }} className="absolute top-4 right-4 bg-red-600/80 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg z-30 transition-transform hover:scale-110">
                                            ✕
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* RSVP */}
                    <section id="rsvp" className="py-24 px-6 max-w-md mx-auto scroll-mt-20">
                        <div className="bg-white p-12 rounded-[4rem] shadow-2xl text-center border border-stone-100">
                            {!submitted ? (
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    if (!user) return;
                                    const db = window.FB.getFirestore();
                                    const appId = "wedding-alessia-roberto-2026";
                                    await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'rsvp'), { 
                                        name: formData.name, 
                                        status: formData.attending,
                                        timestamp: window.FB.serverTimestamp() 
                                    });
                                    setSubmitted(true);
                                }} className="space-y-10">
                                    <h2 className="text-5xl text-[#7a3e2e] font-cursive">Conferma Presenza</h2>
                                    <div className="space-y-4">
                                        <label className="text-[10px] uppercase font-bold text-stone-400 tracking-widest block">Nome e Cognome</label>
                                        <input type="text" required placeholder="Inserisci qui..." value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full border-b-2 border-stone-100 py-3 text-center focus:border-[#7a3e2e] focus:outline-none bg-transparent text-xl font-medium transition-colors" />
                                    </div>
                                    
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setFormData({...formData, attending:'si'})} className={`flex-1 py-5 rounded-3xl font-bold text-[11px] tracking-widest transition-all ${formData.attending==='si'?'bg-[#7a3e2e] text-white shadow-xl scale-105':'bg-stone-50 text-stone-400 hover:bg-stone-100'}`}>SÌ, CI SARÒ</button>
                                        <button type="button" onClick={() => setFormData({...formData, attending:'no'})} className={`flex-1 py-5 rounded-3xl font-bold text-[11px] tracking-widest transition-all ${formData.attending==='no'?'bg-stone-800 text-white shadow-xl scale-105':'bg-stone-50 text-stone-400 hover:bg-stone-100'}`}>NON RIESCO</button>
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-[#7a3e2e] text-white py-5 rounded-full font-bold uppercase text-[12px] tracking-[0.2em] shadow-2xl hover:bg-[#8e4a37] transition-all">Invia RSVP</button>
                                </form>
                            ) : (
                                <div className="py-12 animate-fade-in">
                                    <div className="text-6xl mb-6">❤️</div>
                                    <p className="text-4xl font-cursive text-[#7a3e2e] mb-4">Grazie mille!</p>
                                    <p className="text-[11px] uppercase tracking-[0.2em] text-stone-400 leading-loose">La tua risposta è stata salvata correttamente.</p>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Pannello Admin */}
                    {isAdmin && (
                        <div className="max-w-2xl mx-auto mt-20 px-6 animate-fade-in">
                            <div className="bg-stone-900 text-white p-10 rounded-[3.5rem] shadow-2xl">
                                <div className="flex justify-between items-center border-b border-white/10 pb-6 mb-8">
                                    <h3 className="text-xs font-bold tracking-[0.3em] uppercase">Riepilogo Risposte</h3>
                                    <span className="bg-orange-400/20 text-orange-400 px-4 py-1 rounded-full text-[10px] font-bold">
                                        {rsvps.filter(r => r.status === 'si').length} PRESENTI
                                    </span>
                                </div>
                                <div className="space-y-4 max-h-80 overflow-y-auto custom-scrollbar pr-4">
                                    {rsvps.map(r => (
                                        <div key={r.id} className="flex justify-between items-center text-[12px] py-3 border-b border-white/5 last:border-0">
                                            <span className="font-bold uppercase tracking-wider">{r.name || 'Anonimo'}</span>
                                            <span className={`px-3 py-1 rounded-full text-[9px] font-bold ${r.status === 'si' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                                {(r.status || 'n/a').toUpperCase()}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-32 py-20 text-center border-t border-stone-100">
                        <p className="text-5xl font-cursive text-[#7a3e2e] mb-6">Alessia & Roberto</p>
                        <div className="w-12 h-[1px] bg-stone-200 mx-auto mb-6"></div>
                        <p className="text-[10px] uppercase tracking-[0.5em] text-stone-400">11 Luglio 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
