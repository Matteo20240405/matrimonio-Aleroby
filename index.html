<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alessia & Roberto - 11 Luglio 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Lora', serif; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .scroll-mt-20 { scroll-margin-top: 5rem; }
    </style>
</head>
<body class="bg-[#fff4e6]">
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBkRq8hMwlsSjhc-4Z8mMGDsbWvx295F54",
            authDomain: "matrimonio-ale-e-roby-5248c.firebaseapp.com",
            projectId: "matrimonio-ale-e-roby-5248c",
            storageBucket: "matrimonio-ale-e-roby-5248c.firebasestorage.app",
            messagingSenderId: "797207643656",
            appId: "1:797207643656:web:177acffeab23841cb6f3bd"
        };

        // Esposizione globale per React
        window.FB = { 
            initializeApp, getFirestore, collection, addDoc, onSnapshot, 
            serverTimestamp, deleteDoc, doc, getAuth, signInAnonymously, 
            signInWithCustomToken, onAuthStateChanged, query, 
            config: firebaseConfig 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const URL_FOTO_HERO = "https://raw.githubusercontent.com/Matteo20240405/matrimonio-Aleroby/main/IMG-20260103-WA0013.jpg";
        const URL_FOTO_CHIESA = "https://i.ibb.co/XxvzKNhg/Vendone-panorama.jpg"; 
        const URL_FOTO_LOCATION = "https://i.ibb.co/8DZVrcC4/borgofasceo.jpg";
        
        const DATA_MATRIMONIO = new Date("2026-07-11T16:30:00");

        const compressImage = (base64Str, maxWidth = 1024, maxHeight = 1024) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    } else {
                        if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [photos, setPhotos] = useState([]);
            const [rsvps, setRsvps] = useState([]);
            const [formData, setFormData] = useState({ name: '', attending: 'si' });
            const [submitted, setSubmitted] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [selectedPhoto, setSelectedPhoto] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            
            const clickCount = useRef(0);
            const clickTimer = useRef(null);

            useEffect(() => {
                if (!window.FB || !window.FB.config) return;

                const app = window.FB.initializeApp(window.FB.config);
                const auth = window.FB.getAuth(app);
                
                const initAuth = async () => {
                    // FIX: Gestione robusta dell'autenticazione per evitare errori di Custom Token Mismatch
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenErr) {
                                // Se il token fallisce, ripieghiamo sull'anonimo
                                await window.FB.signInAnonymously(auth);
                            }
                        } else {
                            await window.FB.signInAnonymously(auth);
                        }
                    } catch (err) { 
                        console.error("Errore critico Auth:", err); 
                    }
                };
                
                initAuth();
                const unsubAuth = window.FB.onAuthStateChanged(auth, setUser);

                const timer = setInterval(() => {
                    const now = new Date();
                    const diff = DATA_MATRIMONIO - now;
                    if (diff > 0) {
                        setTimeLeft({
                            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            minutes: Math.floor((diff / 1000 / 60) % 60),
                            seconds: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);

                return () => { clearInterval(timer); unsubAuth(); };
            }, []);

            useEffect(() => {
                // Carica i dati solo dopo che l'utente è autenticato
                if (!user || !window.FB) return;
                const db = window.FB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-alessia-roberto-2026';
                
                const unsubP = window.FB.onSnapshot(
                    window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'photos'), 
                    snap => {
                        const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                        setPhotos(data.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                    },
                    err => console.error("Errore recupero foto:", err)
                );

                const unsubR = window.FB.onSnapshot(
                    window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'rsvp'), 
                    snap => {
                        setRsvps(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    },
                    err => console.error("Errore recupero RSVP:", err)
                );

                return () => { unsubP(); unsubR(); };
            }, [user]);

            const handleAdminToggle = () => {
                clickCount.current++;
                if (clickCount.current === 1) clickTimer.current = setTimeout(() => clickCount.current = 0, 2000);
                if (clickCount.current >= 3) {
                    setIsAdmin(!isAdmin);
                    clickCount.current = 0;
                    clearTimeout(clickTimer.current);
                }
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !user) return;
                setUploading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const compressedBase64 = await compressImage(reader.result);
                        const db = window.FB.getFirestore();
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-alessia-roberto-2026';
                        await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'photos'), {
                            url: compressedBase64, 
                            userId: user.uid, 
                            timestamp: window.FB.serverTimestamp()
                        });
                    } catch (err) {
                        console.error("Errore upload:", err);
                    } finally { setUploading(false); }
                };
                reader.readAsDataURL(file);
            };

            const handleDeletePhoto = async (e, photoId) => {
                e.preventDefault();
                e.stopPropagation();
                try {
                    const db = window.FB.getFirestore();
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-alessia-roberto-2026';
                    const photoRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'photos', photoId);
                    await window.FB.deleteDoc(photoRef);
                } catch (err) {
                    console.error("Errore eliminazione:", err);
                }
            };

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if(el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="text-stone-900 min-h-screen pb-10">
                    <nav className="fixed top-0 w-full z-50 py-5 px-6 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
                        <span onClick={handleAdminToggle} className="text-3xl font-bold italic text-white cursor-pointer font-cursive select-none">A & R</span>
                        <div className="flex gap-4">
                            <button onClick={() => scrollTo('info')} className="text-white text-[10px] uppercase tracking-widest font-bold hidden md:block">Info</button>
                            <button onClick={() => scrollTo('rsvp')} className="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border border-white/30 text-white text-[11px] font-bold uppercase tracking-widest">RSVP</button>
                        </div>
                    </nav>

                    <header className="relative w-full h-screen flex flex-col justify-center items-center overflow-hidden">
                        <img src={URL_FOTO_HERO} className="absolute inset-0 w-full h-full object-cover" alt="Sposi" />
                        <div className="absolute inset-0 bg-black/30 z-10" />
                        <div className="relative z-20 text-center px-6 animate-fade-in">
                            <h1 className="text-7xl md:text-9xl mb-4 italic text-white font-cursive drop-shadow-lg">Alessia & Roberto</h1>
                            <p className="text-white tracking-[0.4em] uppercase text-xs font-bold opacity-90 mb-12">11 Luglio 2026 • Vendone</p>
                            <div className="flex gap-4 justify-center text-white">
                                {[{label:'Giorni', v:timeLeft.days}, {label:'Ore', v:timeLeft.hours}, {label:'Min', v:timeLeft.minutes}].map((t,i) => (
                                    <div key={i} className="bg-white/10 backdrop-blur-md p-4 rounded-2xl w-20 border border-white/20">
                                        <span className="block text-2xl font-bold">{t.v}</span>
                                        <span className="text-[10px] uppercase opacity-70">{t.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </header>

                    <section id="info" className="py-24 px-6 max-w-5xl mx-auto space-y-20 scroll-mt-20">
                        <div className="text-center">
                            <h2 className="text-5xl text-[#7a3e2e] font-cursive mb-4">Dove e Quando</h2>
                            <p className="text-stone-500 uppercase tracking-widest text-[10px]">I dettagli della giornata</p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-12">
                            <div className="bg-white rounded-[2rem] overflow-hidden shadow-xl group border border-stone-100">
                                <div className="h-64 overflow-hidden">
                                    <img src={URL_FOTO_CHIESA} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Chiesa" />
                                </div>
                                <div className="p-8 text-center">
                                    <h3 className="text-2xl font-cursive text-[#7a3e2e] mb-2">La Cerimonia</h3>
                                    <p className="text-sm text-stone-600 mb-6 italic">Santuario di Maria Santissima, Vendone<br/>Ore 16:00</p>
                                    <a href="https://maps.google.com/?q=Santuario+Maria+Santissima+Vendone" target="_blank" className="inline-block border-b border-[#7a3e2e] text-[#7a3e2e] text-[10px] font-bold uppercase tracking-widest pb-1 hover:opacity-70 transition">Apri Mappa</a>
                                </div>
                            </div>

                            <div className="bg-white rounded-[2rem] overflow-hidden shadow-xl group border border-stone-100">
                                <div className="h-64 overflow-hidden">
                                    <img src={URL_FOTO_LOCATION} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Ricevimento" />
                                </div>
                                <div className="p-8 text-center">
                                    <h3 className="text-2xl font-cursive text-[#7a3e2e] mb-2">Il Ricevimento</h3>
                                    <p className="text-sm text-stone-600 mb-6 italic">Borgo Fasceo, Ortovero<br/>A seguire</p>
                                    <a href="https://maps.google.com/?q=Borgo+Fasceo+Alassio" target="_blank" className="inline-block border-b border-[#7a3e2e] text-[#7a3e2e] text-[10px] font-bold uppercase tracking-widest pb-1 hover:opacity-70 transition">Apri Mappa</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="rsvp" className="py-20 px-6 max-w-sm mx-auto scroll-mt-20">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl text-center border border-orange-50">
                            {!submitted ? (
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    if (!user) return;
                                    const db = window.FB.getFirestore();
                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-alessia-roberto-2026';
                                    await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'rsvp'), { ...formData, timestamp: window.FB.serverTimestamp() });
                                    setSubmitted(true);
                                }} className="space-y-8">
                                    <h2 className="text-4xl text-[#7a3e2e] font-cursive">Ci sarete?</h2>
                                    <input type="text" required placeholder="Il tuo nome" onChange={e => setFormData({...formData, name: e.target.value})} className="w-full border-b py-2 text-center focus:outline-none focus:border-[#7a3e2e] bg-transparent text-lg" />
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setFormData({...formData, attending:'si'})} className={`flex-1 py-4 rounded-xl font-bold text-[10px] tracking-widest transition-all ${formData.attending==='si'?'bg-[#7a3e2e] text-white shadow-md':'bg-stone-100 text-stone-400'}`}>SÌ</button>
                                        <button type="button" onClick={() => setFormData({...formData, attending:'no'})} className={`flex-1 py-4 rounded-xl font-bold text-[10px] tracking-widest transition-all ${formData.attending==='no'?'bg-stone-800 text-white shadow-md':'bg-stone-100 text-stone-400'}`}>NO</button>
                                    </div>
                                    <button type="submit" className="w-full bg-[#7a3e2e] text-white py-4 rounded-full font-bold uppercase text-[11px] tracking-widest shadow-xl active:scale-95 transition-transform">Invia Risposta</button>
                                </form>
                            ) : (
                                <div className="py-10 animate-fade-in">
                                    <p className="text-4xl text-[#7a3e2e] font-cursive mb-2">Grazie! ❤️</p>
                                    <p className="text-[10px] uppercase tracking-widest opacity-50">Risposta inviata</p>
                                </div>
                            )}
                        </div>
                    </section>

                    <section className="py-12 px-6 text-center max-w-5xl mx-auto">
                        <h2 className="text-4xl text-[#7a3e2e] mb-2 font-cursive">Momenti Condivisi</h2>
                        <label className="cursor-pointer bg-[#7a3e2e] text-white px-8 py-4 rounded-full font-bold text-[11px] shadow-lg inline-block active:scale-95 transition-transform my-8">
                            {uploading ? 'CARICAMENTO...' : '📸 CARICA FOTO'}
                            <input type="file" accept="image/*" onChange={handleUpload} className="hidden" disabled={uploading} />
                        </label>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {photos.map(p => (
                                <div key={p.id} className="aspect-square rounded-2xl overflow-hidden shadow-md border-4 border-white relative group animate-fade-in">
                                    <img src={p.url} className="w-full h-full object-cover cursor-zoom-in" onClick={() => setSelectedPhoto(p.url)} alt="Foto condivisa" />
                                    {(isAdmin || (user && p.userId === user.uid)) && (
                                        <button 
                                            onClick={(e) => handleDeletePhoto(e, p.id)} 
                                            className="absolute top-2 right-2 bg-white/90 p-2 rounded-full text-red-600 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity shadow-lg z-10 scale-90 active:scale-75"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </section>

                    {isAdmin && (
                        <div className="max-w-md mx-auto mt-20 bg-stone-900 text-white p-8 rounded-[2.5rem] shadow-2xl animate-fade-in">
                            <h3 className="text-xs font-bold border-b border-white/10 pb-4 mb-6 flex justify-between tracking-widest uppercase">
                                <span>Lista Invitati</span>
                                <span className="text-orange-300">
                                    {rsvps.filter(r => r.attending === 'si').length} PRESENTI
                                </span>
                            </h3>
                            <div className="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                {rsvps.map(r => (
                                    <div key={r.id} className="flex justify-between items-center text-[11px] py-1 border-b border-white/5">
                                        <span className="font-bold uppercase tracking-tight">{r.name || 'Anonimo'}</span>
                                        <span className={(r.attending || 'si') === 'si' ? 'text-green-400' : 'text-red-400'}>
                                            {(r.attending || 'n/a').toUpperCase()}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {selectedPhoto && (
                        <div className="fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out animate-fade-in" onClick={() => setSelectedPhoto(null)}>
                            <img src={selectedPhoto} className="max-w-full max-h-[90vh] rounded-lg shadow-2xl" />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
